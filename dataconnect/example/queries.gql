query GetVendorDetails($vendorId: UUID!) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it only retrieves vendor details.") {
  vendor(id: $vendorId) {
    name
    location
    openingTime
    closingTime
    description
    contactEmail
    contactPhone
    logoUrl
    menuItems_on_vendor {
      id
      name
      price
      category
      isAvailable
    }
  }
}

query GetUserOrders @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as it retrieves only their own orders.") {
  orders(where: {userId: {eq_expr: "auth.uid"}}) {
    id
    orderDate
    totalAmount
    status
    pickupTime
    vendor {
      name
      location
    }
    orderItems_on_order {
      quantity
      unitPrice
      menuItem {
        name
      }
    }
  }
}

mutation CreateOrder($vendorId: UUID!, $orderDate: Date!, $totalAmount: Float!, $items: [OrderItem_Data!]!) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as they are creating their own order.") {
  order: order_insert(data: {
    userId_expr: "auth.uid",
    vendorId: $vendorId,
    orderDate: $orderDate,
    totalAmount: $totalAmount,
    status: "Pending",
    createdAt_expr: "request.time",
    updatedAt_expr: "request.time"
  }) {
    id
  }
  orderItems_insertMany(data: $items) {
    id
  }
}

mutation UpdateUserProfile($displayName: String, $email: String, $phoneNumber: String, $photoUrl: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as they are updating their own profile.") {
  user_update(
    where: {authId: {eq_expr: "auth.uid"}},
    data: {
      displayName: $displayName,
      email: $email,
      phoneNumber: $phoneNumber,
      photoUrl: $photoUrl
    }
  ) {
    id
  }
}