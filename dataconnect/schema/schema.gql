type User @table {
  authId: String!
  displayName: String!
  userType: String!
  createdAt: Timestamp!
  email: String
  phoneNumber: String
  photoUrl: String
}

type Vendor @table {
  user: User!
  name: String!
  location: String!
  openingTime: String!
  closingTime: String!
  createdAt: Timestamp!
  description: String
  contactEmail: String
  contactPhone: String
  logoUrl: String
}

type MenuItem @table {
  vendor: Vendor!
  name: String!
  price: Float!
  createdAt: Timestamp!
  description: String
  category: String
  imageUrl: String
  isAvailable: Boolean
}

type Order @table {
  user: User!
  vendor: Vendor!
  orderDate: Date!
  totalAmount: Float!
  status: String!
  createdAt: Timestamp!
  updatedAt: Timestamp!
  notes: String
  pickupTime: Timestamp
}

type OrderItem @table {
  order: Order!
  menuItem: MenuItem!
  quantity: Int!
  unitPrice: Float!
  notes: String
}